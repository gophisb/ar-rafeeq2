<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الصفحة غير موجودة — الرفيق</title>
  <style>
    :root { --bg: #080B10; --gold: #D4AF37; --text: #F1EFE9; --muted: #8892A0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Tajawal', 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text);
      display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
    .container { max-width: 400px; }
    .icon { font-size: 4rem; margin-bottom: 20px; }
    h1 { font-family: 'Amiri', serif; color: var(--gold); font-size: 2.5rem; margin-bottom: 10px; }
    p { color: var(--muted); margin-bottom: 30px; font-size: 1rem; line-height: 1.6; }
    a { display: inline-block; padding: 12px 30px; background: var(--gold); color: #080B10; text-decoration: none;
      border-radius: 99px; font-weight: 600; transition: opacity 0.3s; }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🕌</div>
    <h1>الصفحة غير موجودة</h1>
    <p>عذراً، الرابط الذي تبحث عنه غير موجود. ربما تم نقل الصفحة أو حذفها.</p>
    <a href="./index.html">العودة إلى الرئيسية</a>
  </div>
</body>
</html>
